# NanoGPT-Lite Configuration (Conservative)

model:
  n_embd: 128
  n_head: 4
  n_layer: 4
  block_size: 128
  dropout: 0.2

tokenizer:
  type: character-level

training:
  batch_size: 16
  learning_rate: 1e-5
  min_lr: 1e-6
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_iters: 2
  lr_decay_iters: 10
  max_steps: 10
  eval_interval: 10
  output_dir: 'training/checkpoints'
  decay_lr: True

data:
    path: 'dataset/processed/train.txt'

inference:
  precision: FP16
  temperature: 0.8
  top_p: 0.9
  repetition_penalty: 1.1
