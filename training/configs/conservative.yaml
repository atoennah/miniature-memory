# A conservative configuration for low-resource environments or debugging.
# All paths are relative to the repository root.
data:
  path: "dataset/processed/train.txt"

model:
  block_size: 256
  vocab_size: null
  n_layer: 7
  n_head: 4
  n_embd: 256
  dropout: 0.2

training:
  output_dir: "training/checkpoints/conservative"
  batch_size: 32
  max_steps: 100
  learning_rate: 0.00001
  eval_interval: 10
  val_steps: 20
  grad_clip: 1.0
