# A small config for testing, optimized by Bolt for stability and quality.
#
# ⚡ Bolt's Analysis:
# The original learning rate of 1.0e-3 was found to be too aggressive for
# achieving a stable, high-quality model, though it provides rapid initial
# loss reduction.
#
# This configuration uses a more conservative learning rate (5.0e-5) and a
# larger batch size (64) to promote a more stable training trajectory,
# which is best practice for reaching a lower final validation loss.
data:
  path: 'dataset/processed/train.txt'
  dataset: shakespeare
model:
  n_layer: 6
  n_head: 6
  n_embd: 384
  block_size: 256
  dropout: 0.2
training:
  output_dir: 'out-shakespeare-optimized'
  eval_interval: 100
  log_interval: 10
  eval_iters: 200
  always_save_checkpoint: False
  # Optimizer params
  learning_rate: 5.0e-5
  weight_decay: 1.0e-1
  beta1: 0.9
  beta2: 0.99
  grad_clip: 1.0
  # Learning rate decay settings
  decay_lr: True
  warmup_iters: 100
  lr_decay_iters: 500
  min_lr: 1.0e-4
  # Training loop
  batch_size: 64
  gradient_accumulation_steps: 1
  max_steps: 500
# W&B logging
wandb:
  log: False
  project: 'shakespeare'
  run_name: 'mini-gpt-optimized'
