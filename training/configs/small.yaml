# A small config for testing, restructured for clarity and compatibility.
data:
  path: 'dataset/processed/train.txt' # Default path, can be overridden.
model:
  n_layer: 6
  n_head: 6
  n_embd: 384
  block_size: 256  # context of up to 256 previous characters
  dropout: 0.2
training:
  output_dir: 'training/checkpoints'
  eval_interval: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-1
  beta1: 0.9
  beta2: 0.99
  grad_clip: 1.0
  decay_lr: True
  warmup_iters: 100
  lr_decay_iters: 500
  min_lr: 1.0e-4
  batch_size: 32
  max_steps: 500
inference:
  temperature: 1.0
  top_p: 0.9
