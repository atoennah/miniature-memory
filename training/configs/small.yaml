# A small config for testing
data:
  path: dataset/processed/train.txt

model:
  block_size: 256 # context of up to 256 previous characters
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.2

training:
  out_dir: 'out'
  eval_interval: 250 # keep frequent
  eval_iters: 200
  log_interval: 10 # don't print too too often
  always_save_checkpoint: False
  batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 0.001
  max_steps: 5000
  lr_decay_iters: 5000
  min_lr: 0.0001
  beta1: 0.9
  beta2: 0.99
  weight_decay: 0.1
  grad_clip: 1.0
  decay_lr: True
  warmup_iters: 100

wandb:
  wandb_log: False
  wandb_project: 'shakespeare'
  wandb_run_name: 'mini-gpt'
