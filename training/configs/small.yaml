# Default configuration for a small model, intended for quick local testing.
# All paths are relative to the repository root.
data:
  path: "dataset/processed/train.txt"

model:
  block_size: 256
  vocab_size: null  # Dynamically set by the DataManager
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.2

training:
  output_dir: "training/checkpoints/small"
  batch_size: 64
  max_steps: 5000
  learning_rate: 0.001
  eval_interval: 250
  val_steps: 20  # Number of batches to use for validation
  grad_clip: 1.0 # Gradient clipping value, 0 to disable
