data:
  path: 'dataset/processed/train.txt'
model:
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.2
training:
  batch_size: 32  # Reduced from 64 for stability on CPU/small RAM
  learning_rate: 0.001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.99
  min_lr: 0.0001
  warmup_iters: 100
  lr_decay_iters: 5000
  max_steps: 100
  eval_interval: 10
  output_dir: 'out'
inference:
  temperature: 1.0
  top_p: 0.9
