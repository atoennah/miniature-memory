# NanoGPT-Lite Configuration (Small - Optimized)
# NanoGPT-Lite Configuration (Small - Optimized by Bolt)

model:
  n_embd: 256
  n_head: 4
  n_layer: 7
  block_size: 256
  dropout: 0.2

tokenizer:
  type: character-level

training:
  batch_size: 64 # Optimized: Power of 2 for GPU efficiency
  learning_rate: 5e-4 # Optimized: Bolt suggests 5e-4 for faster convergence on clean data
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_iters: 10
  lr_decay_iters: 100
  min_lr: 5e-5
  decay_lr: True
  epochs: 1
  output_dir: 'training/checkpoints'
  max_steps: 100
  eval_interval: 10

data:
    path: 'dataset/processed/train.txt'

inference:
  precision: FP16
  temperature: 0.8
  top_p: 0.9
  repetition_penalty: 1.1
