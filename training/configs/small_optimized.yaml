# An optimized configuration for a small model, balancing performance and resource usage.
# All paths are relative to the repository root.
data:
  path: "dataset/processed/train.txt"

model:
  block_size: 256
  vocab_size: null
  n_layer: 7
  n_head: 4
  n_embd: 256
  dropout: 0.2

training:
  output_dir: "training/checkpoints/small_optimized"
  batch_size: 64
  max_steps: 100
  learning_rate: 0.00005
  eval_interval: 10
  val_steps: 20
  grad_clip: 1.0
