model:
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 128
  dropout: 0.1
training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  max_steps: 10
  eval_interval: 5
  output_dir: 'out-benchmark'
  warmup_iters: 0
  lr_decay_iters: 10
  min_lr: 0.0001
  decay_lr: false
