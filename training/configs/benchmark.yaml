# Configuration for benchmarking scripts (benchmark.py and benchmark_inference.py)
# This file provides a consistent model and batch size for performance measurements.

# Benchmark configuration with nested structure
model:
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 128
  dropout: 0.1
training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  max_steps: 10
  eval_interval: 5
  output_dir: 'out-benchmark'
  warmup_iters: 0
  lr_decay_iters: 10
  min_lr: 0.0001
  decay_lr: false
  n_layer: 6
  n_head: 6
  n_embd: 384
  block_size: 256
  dropout: 0.2

training:
  batch_size: 64 # A larger batch size to better saturate the hardware for benchmarking.
