
model:
  block_size: 16
  n_layer: 1
  n_head: 1
  n_embd: 16
  dropout: 0.0
training:
  batch_size: 2
  learning_rate: 0.001
  min_lr: 0.0001
  warmup_iters: 2
  lr_decay_iters: 10
  max_steps: 5
  eval_interval: 1
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.99
  output_dir: training/checkpoints
data:
  path: dataset/processed/train.txt
inference:
  temperature: 1.0
  top_p: 0.9
